name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + build
        run: npm run build

      - name: Test
        run: npx vitest run
